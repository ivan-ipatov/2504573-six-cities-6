openapi: 3.0.3
info:
  title: Six Cities API
  description: API for renting apartments in six European cities
  version: 1.0.0

servers:
  - url: http://localhost:{port}
    variables:
      port:
        default: "3000"

tags:
  - name: Users
    description: User management
  - name: Offers
    description: Rental offers
  - name: Categories
    description: Offer categories
  - name: Comments
    description: Comments on offers

paths:
  /users:
    get:
      summary: Get all users
      tags:
        - Users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      summary: Create a new user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error

  /users/{userId}:
    get:
      summary: Get user by ID
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found

    delete:
      summary: Delete user by ID
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deleted
        "404":
          description: User not found

  /users/{userId}/avatar:
    post:
      summary: Upload user avatar
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "201":
          description: Avatar uploaded
        "400":
          description: Invalid file format

  /offers:
    get:
      summary: Get all offers
      tags:
        - Offers
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 60
        - name: category
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/SortType"
      responses:
        "200":
          description: List of offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Offer"

    post:
      summary: Create a new offer
      tags:
        - Offers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOffer"
      responses:
        "201":
          description: Offer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Offer"

  /offers/{offerId}:
    get:
      summary: Get offer by ID
      tags:
        - Offers
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Offer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Offer"
        "404":
          description: Offer not found

    put:
      summary: Update offer
      tags:
        - Offers
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOffer"
      responses:
        "200":
          description: Offer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Offer"

    delete:
      summary: Delete offer
      tags:
        - Offers
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Offer deleted

  /offers/premium/{city}:
    get:
      summary: Get premium offers by city
      tags:
        - Offers
      parameters:
        - name: city
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/City"
      responses:
        "200":
          description: List of premium offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Offer"

  /offers/favorite:
    get:
      summary: Get favorite offers
      tags:
        - Offers
      responses:
        "200":
          description: List of favorite offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Offer"

    post:
      summary: Add offer to favorites
      tags:
        - Offers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                offerId:
                  type: string
      responses:
        "201":
          description: Added to favorites

  /offers/favorite/{offerId}:
    delete:
      summary: Remove offer from favorites
      tags:
        - Offers
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed from favorites

  /offers/{offerId}/comments:
    get:
      summary: Get comments for offer
      tags:
        - Comments
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

    post:
      summary: Add comment to offer
      tags:
        - Comments
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComment"
      responses:
        "201":
          description: Comment added

  /categories:
    get:
      summary: Get all categories
      tags:
        - Categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

    post:
      summary: Create a new category
      tags:
        - Categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategory"
      responses:
        "201":
          description: Category created

  /categories/{categoryId}:
    get:
      summary: Get category by ID
      tags:
        - Categories
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category found

  /offers/{offerId}/comments/{commentId}:
    delete:
      summary: Delete comment
      tags:
        - Comments
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment deleted

  /login:
    post:
      summary: User login
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /logout:
    post:
      summary: User logout
      tags:
        - Users
      responses:
        "200":
          description: Logout successful

components:
  schemas:
    User:
      type: object
      required:
        - email
        - firstname
        - lastname
        - password
        - userType
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstname:
          type: string
          minLength: 1
          maxLength: 15
        lastname:
          type: string
          minLength: 1
          maxLength: 15
        avatarPath:
          type: string
          nullable: true
        userType:
          type: string
          enum:
            - regular
            - pro

    CreateUser:
      type: object
      required:
        - email
        - firstname
        - lastname
        - password
        - userType
      properties:
        email:
          type: string
          format: email
        firstname:
          type: string
          minLength: 1
          maxLength: 15
        lastname:
          type: string
          minLength: 1
          maxLength: 15
        password:
          type: string
          minLength: 6
          maxLength: 12
        userType:
          type: string
          enum:
            - regular
            - pro

    Offer:
      type: object
      required:
        - title
        - description
        - postDate
        - city
        - previewImage
        - images
        - isPremium
        - isFavorite
        - rating
        - type
        - rooms
        - guests
        - price
        - facilities
        - author
        - coordinates
      properties:
        id:
          type: string
        title:
          type: string
          minLength: 10
          maxLength: 100
        description:
          type: string
          minLength: 20
          maxLength: 1024
        postDate:
          type: string
          format: date-time
        city:
          $ref: "#/components/schemas/City"
        previewImage:
          type: string
          format: uri
        images:
          type: array
          items:
            type: string
            format: uri
          minItems: 6
          maxItems: 6
        isPremium:
          type: boolean
        isFavorite:
          type: boolean
        rating:
          type: number
          minimum: 1
          maximum: 5
        type:
          $ref: "#/components/schemas/OfferType"
        rooms:
          type: integer
          minimum: 1
          maximum: 8
        guests:
          type: integer
          minimum: 1
          maximum: 10
        price:
          type: integer
          minimum: 100
          maximum: 100000
        facilities:
          type: array
          items:
            $ref: "#/components/schemas/Facility"
        author:
          $ref: "#/components/schemas/User"
        commentCount:
          type: integer
        coordinates:
          $ref: "#/components/schemas/Coordinates"

    CreateOffer:
      type: object
      required:
        - title
        - description
        - postDate
        - city
        - previewImage
        - images
        - isPremium
        - rating
        - type
        - rooms
        - guests
        - price
        - facilities
        - coordinates
      properties:
        title:
          type: string
          minLength: 10
          maxLength: 100
        description:
          type: string
          minLength: 20
          maxLength: 1024
        postDate:
          type: string
          format: date-time
        city:
          $ref: "#/components/schemas/City"
        previewImage:
          type: string
          format: uri
        images:
          type: array
          items:
            type: string
            format: uri
        isPremium:
          type: boolean
        rating:
          type: number
          minimum: 1
          maximum: 5
        type:
          $ref: "#/components/schemas/OfferType"
        rooms:
          type: integer
          minimum: 1
          maximum: 8
        guests:
          type: integer
          minimum: 1
          maximum: 10
        price:
          type: integer
          minimum: 100
          maximum: 100000
        facilities:
          type: array
          items:
            $ref: "#/components/schemas/Facility"
        coordinates:
          $ref: "#/components/schemas/Coordinates"

    UpdateOffer:
      type: object
      properties:
        title:
          type: string
          minLength: 10
          maxLength: 100
        description:
          type: string
          minLength: 20
          maxLength: 1024
        previewImage:
          type: string
          format: uri
        images:
          type: array
          items:
            type: string
            format: uri
        isPremium:
          type: boolean
        isFavorite:
          type: boolean
        rating:
          type: number
          minimum: 1
          maximum: 5
        type:
          $ref: "#/components/schemas/OfferType"
        rooms:
          type: integer
          minimum: 1
          maximum: 8
        guests:
          type: integer
          minimum: 1
          maximum: 10
        price:
          type: integer
          minimum: 100
          maximum: 100000
        facilities:
          type: array
          items:
            $ref: "#/components/schemas/Facility"

    Comment:
      type: object
      required:
        - text
        - rating
        - author
      properties:
        id:
          type: string
        text:
          type: string
          minLength: 5
          maxLength: 1024
        postDate:
          type: string
          format: date-time
        rating:
          type: integer
          minimum: 1
          maximum: 5
        author:
          $ref: "#/components/schemas/User"

    CreateComment:
      type: object
      required:
        - text
        - rating
      properties:
        text:
          type: string
          minLength: 5
          maxLength: 1024
        rating:
          type: integer
          minimum: 1
          maximum: 5

    Category:
      type: object
      required:
        - name
        - image
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
          format: uri

    CreateCategory:
      type: object
      required:
        - name
        - image
      properties:
        name:
          type: string
        image:
          type: string
          format: uri

    City:
      type: string
      enum:
        - Paris
        - Cologne
        - Brussels
        - Amsterdam
        - Hamburg
        - Dusseldorf

    OfferType:
      type: string
      enum:
        - apartment
        - house
        - room
        - hotel

    Facility:
      type: string
      enum:
        - Breakfast
        - Air conditioning
        - Laptop friendly workspace
        - Baby seat
        - Washer
        - Towels
        - Fridge

    Coordinates:
      type: object
      required:
        - latitude
        - longitude
      properties:
        latitude:
          type: number
        longitude:
          type: number

    SortType:
      type: string
      enum:
        - date
        - rating
        - price

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []